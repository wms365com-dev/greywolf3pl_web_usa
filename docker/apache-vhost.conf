<VirtualHost *:${PORT}>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    PassEnv GW_DISABLE_CANONICAL_REDIRECT
    PassEnv GW_STORAGE_DIR
    PassEnv GW_TO_EMAIL
    PassEnv GW_FROM_DOMAIN
    PassEnv GW_SITE_URL
    PassEnv RAILWAY_PUBLIC_DOMAIN
    PassEnv DATABASE_URL
    PassEnv PGHOST
    PassEnv PGPORT
    PassEnv PGDATABASE
    PassEnv PGUSER
    PassEnv PGPASSWORD
    PassEnv PGSSLMODE
    PassEnv GW_DB_SSLMODE
    PassEnv GW_GOOGLE_SHEET_WEBHOOK_URL
    PassEnv GW_SMTP_HOST
    PassEnv GW_SMTP_PORT
    PassEnv GW_SMTP_USERNAME
    PassEnv GW_SMTP_PASSWORD
    PassEnv GW_SMTP_SECURE
    PassEnv GW_SMTP_AUTH
    PassEnv GW_SMTP_DEBUG
    PassEnv GW_SMTP_FROM_EMAIL
    PassEnv GW_SMTP_FROM_NAME
    PassEnv GW_SMTP_DISABLE_NATIVE_FALLBACK

    <Directory /var/www/html>
        AllowOverride All
        Require all granted
        Options FollowSymLinks
        DirectoryIndex index.html index.php
    </Directory>

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>
